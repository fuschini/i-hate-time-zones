<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Globe/clock circle -->
  <circle cx="16" cy="16" r="14" fill="#FFFFFF" stroke="#1A1A18" stroke-width="2"/>
  <!-- Equator line -->
  <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="#1A1A18" stroke-width="1.2"/>
  <!-- Clock hour hand -->
  <line x1="16" y1="16" x2="10" y2="7" stroke="#8B2500" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock minute hand (pointing ~2 o'clock) -->
  <line x1="16" y1="16" x2="22.5" y2="9" stroke="#8B2500" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#8B2500"/>
</svg>
